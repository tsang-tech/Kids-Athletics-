<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKT 田徑管理系統 V4.0 - 完整名單版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: #334155; }
        .kid-font { font-family: 'ZCOOL+KuaiLe', cursive; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn { transition: all 0.2s; border-radius: 12px; font-weight: 700; padding: 8px 16px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <nav class="bg-white shadow-sm sticky top-0 z-50 no-print border-b border-sky-100">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
            <h1 class="text-xl font-bold text-sky-500 kid-font flex items-center">🏃‍♂️ CKT 田徑系統 V4</h1>
            <div class="flex gap-1 overflow-x-auto">
                <button onclick="showTab('trial')" class="nav-btn bg-sky-500 text-white">成績錄入</button>
                <button onclick="showTab('leaderboard')" class="nav-btn bg-emerald-500 text-white">隊伍龍虎榜</button>
                <button onclick="showTab('lineup')" class="nav-btn bg-amber-500 text-white">項目排陣</button>
                <button onclick="showTab('settings')" class="nav-btn bg-slate-600 text-white">學生管理</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <div id="trial" class="tab-content active">
            <div class="bg-white rounded-3xl shadow-sm p-6 border border-sky-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-sky-600">⏱️ 選拔成績錄入</h2>
                    <select id="filterTeamTrial" onchange="renderTrialEditor()" class="rounded-lg border-sky-200 text-sm"></select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-sky-50 text-sky-700">
                                <th class="p-3">姓名</th>
                                <th class="p-3">項目</th>
                                <th class="p-3">成績 (秒/米/分)</th>
                                <th class="p-3">記錄時間</th>
                            </tr>
                        </thead>
                        <tbody id="trialRows" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="leaderboard" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-emerald-600 kid-font">🏆 隊伍排名榜</h2>
                <select id="leaderTeamSelect" onchange="renderLeaderboard()" class="bg-emerald-50 border-emerald-200 rounded-xl px-4 py-2 font-bold text-emerald-700 ring-2 ring-emerald-100"></select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="leaderGrid"></div>
        </div>

        <div id="lineup" class="tab-content">
            <div class="bg-white rounded-3xl shadow-sm p-6 border border-amber-100">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <span class="font-bold">排陣隊伍：</span>
                        <select id="teamSelect" onchange="renderLineup()" class="rounded-xl border-amber-200 font-bold text-amber-700"></select>
                    </div>
                    <button onclick="window.print()" class="no-print bg-slate-800 text-white px-4 py-2 rounded-lg text-sm">列印排陣</button>
                </div>
                <div id="lineupContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="bg-white rounded-3xl shadow-sm p-6 border">
                <h3 class="font-bold mb-4">學生名單總表 (共 <span id="studentCount">0</span> 人)</h3>
                <div class="flex gap-2 mb-4 no-print">
                    <input type="text" id="newSName" placeholder="姓名" class="border rounded px-2 py-1 w-24">
                    <select id="newSYear" class="border rounded"></select>
                    <select id="newSTeam" class="border rounded"></select>
                    <button onclick="addStudentManual()" class="bg-sky-500 text-white px-4 py-1 rounded">新增</button>
                    <button onclick="resetToDefault()" class="bg-red-100 text-red-600 px-4 py-1 rounded ml-auto">重置預設名單</button>
                </div>
                <div class="overflow-y-auto max-h-[600px]">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 sticky top-0">
                            <tr><th class="p-2 text-left">姓名</th><th class="p-2 text-left">隊伍</th><th class="p-2 text-left">年份</th><th class="p-2">操作</th></tr>
                        </thead>
                        <tbody id="masterStudentTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const EVENTS = ["原地擲膠圈", "速度跨欄", "前拋藥球", "十字跳", "來回節奏跑", "立定跳遠", "擲標槍", "A 級方程式"];
        
        // --- 核心學生數據 (完整名單) ---
        const DEFAULT_STUDENTS = [
            // 2019
            {name: "陳希諾", year: 2019, team: "CKT2019A"}, {name: "陳逸朗", year: 2019, team: "CKT2019A"}, {name: "林嘉盛", year: 2019, team: "CKT2019A"},
            {name: "陳梓瑩", year: 2019, team: "CKT2019A"}, {name: "徐梓添", year: 2019, team: "CKT2019A"}, {name: "邱俊傑", year: 2019, team: "CKT2019A"},
            // 2018 A
            {name: "謝瀚陞", year: 2018, team: "CKT2018A"}, {name: "鄔嘉樂", year: 2018, team: "CKT2018A"}, {name: "胡仲希", year: 2018, team: "CKT2018A"},
            {name: "梁喬珀", year: 2018, team: "CKT2018A"}, {name: "伍梓灝", year: 2018, team: "CKT2018A"},
            // 2018 B
            {name: "李天仁", year: 2018, team: "CKT2018B"}, {name: "雪壬愷", year: 2018, team: "CKT2018B"}, {name: "鄧雅殷", year: 2018, team: "CKT2018B"},
            {name: "鄧善殷", year: 2018, team: "CKT2018B"}, {name: "杜濼麒", year: 2018, team: "CKT2018B"},
            // 2018 C
            {name: "童文涵", year: 2018, team: "CKT2018C"}, {name: "陳希兒", year: 2018, team: "CKT2018C"}, {name: "黄洛鋋", year: 2018, team: "CKT2018C"},
            {name: "李晉兒", year: 2018, team: "CKT2018C"}, {name: "周暟淳", year: 2018, team: "CKT2018C"},
            // 2018 D
            {name: "林靖柔", year: 2018, team: "CKT2018D"}, {name: "李心妤", year: 2018, team: "CKT2018D"}, {name: "李宇軒", year: 2018, team: "CKT2018D"},
            {name: "李泓亮", year: 2018, team: "CKT2018D"}, {name: "邱曼露", year: 2018, team: "CKT2018D"},
            // 2017 A
            {name: "余焌達", year: 2017, team: "CKT2017A"}, {name: "鄧萃藍", year: 2017, team: "CKT2017A"}, {name: "郭俊希", year: 2017, team: "CKT2017A"},
            {name: "羅啟鋒", year: 2017, team: "CKT2017A"}, {name: "彭子恪", year: 2017, team: "CKT2017A"}, {name: "江柏昊", year: 2017, team: "CKT2017A"},
            // 2017 B
            {name: "劉栢熹", year: 2017, team: "CKT2017B"}, {name: "陳希姸", year: 2017, team: "CKT2017B"}, {name: "麥風", year: 2017, team: "CKT2017B"},
            {name: "梁匡毅", year: 2017, team: "CKT2017B"}, {name: "盧鍵霆", year: 2017, team: "CKT2017B"}, {name: "徐梓程", year: 2017, team: "CKT2017B"}
        ];

        let students = JSON.parse(localStorage.getItem('ckt_students_v4')) || DEFAULT_STUDENTS;
        let teams = JSON.parse(localStorage.getItem('ckt_teams_v4')) || ["CKT2017A", "CKT2017B", "CKT2018A", "CKT2018B", "CKT2018C", "CKT2018D", "CKT2019A"];
        let trialResults = JSON.parse(localStorage.getItem('ckt_trial_v4')) || [];
        let lineups = JSON.parse(localStorage.getItem('ckt_lineups_v4')) || {};

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'trial') renderTrialEditor();
            if(tabId === 'leaderboard') renderLeaderboard();
            if(tabId === 'lineup') renderLineup();
            if(tabId === 'settings') renderStudentSettings();
        }

        // --- 1. 成績錄入 ---
        function renderTrialEditor() {
            const team = document.getElementById('filterTeamTrial').value;
            const container = document.getElementById('trialRows');
            container.innerHTML = '';
            const filtered = students.filter(s => s.team === team);

            filtered.forEach(s => {
                EVENTS.forEach((event, idx) => {
                    const record = trialResults.find(r => r.name === s.name && r.event === event) || {score: ''};
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-3 font-bold">${idx === 0 ? s.name : ''}</td>
                        <td class="p-3 text-sky-600 font-medium">${event}</td>
                        <td class="p-3"><input type="number" step="0.01" value="${record.score}" onchange="saveScore('${s.name}', '${event}', this.value)" class="w-24 border-b-2 border-sky-100 outline-none focus:border-sky-500 px-1"></td>
                        <td class="p-3 text-[10px] text-slate-300">${record.ts || '-'}</td>
                    `;
                    container.appendChild(tr);
                });
                container.innerHTML += `<tr class="bg-slate-50"><td colspan="4" class="h-1"></td></tr>`;
            });
        }

        function saveScore(name, event, score) {
            const idx = trialResults.findIndex(r => r.name === name && r.event === event);
            const ts = new Date().toLocaleString();
            if(idx > -1) { trialResults[idx].score = parseFloat(score); trialResults[idx].ts = ts; }
            else { trialResults.push({name, event, score: parseFloat(score), ts}); }
            localStorage.setItem('ckt_trial_v4', JSON.stringify(trialResults));
        }

        // --- 2. 龍虎榜 (按隊伍) ---
        function renderLeaderboard() {
            const team = document.getElementById('leaderTeamSelect').value;
            const container = document.getElementById('leaderGrid');
            container.innerHTML = '';

            EVENTS.forEach(event => {
                // 獲取該隊伍、該項目的成績
                let teamScores = trialResults.filter(r => {
                    const std = students.find(s => s.name === r.name);
                    return std && std.team === team && r.event === event && r.score > 0;
                }).sort((a,b) => b.score - a.score).slice(0, 6);

                let html = `<div class="bg-white rounded-2xl shadow-sm border border-emerald-100 overflow-hidden">
                    <div class="bg-emerald-500 p-2 text-white font-bold text-center text-sm">${event}</div>
                    <div class="p-3 space-y-1">`;
                
                if(teamScores.length === 0) html += `<div class="text-slate-300 text-center text-xs py-4">無成績</div>`;
                else {
                    teamScores.forEach((r, i) => {
                        html += `<div class="flex justify-between text-sm border-b border-emerald-50 py-1">
                            <span class="text-emerald-700 w-4">${i+1}.</span>
                            <span class="flex-grow">${r.name}</span>
                            <span class="font-mono font-bold">${r.score}</span>
                        </div>`;
                    });
                }
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        // --- 3. 排陣 ---
        function renderLineup() {
            const team = document.getElementById('teamSelect').value;
            const teamStudents = students.filter(s => s.team === team);
            const container = document.getElementById('lineupContainer');
            container.innerHTML = '';

            EVENTS.forEach(event => {
                const selections = lineups[team]?.[event] || ["", "", "", ""];
                const card = document.createElement('div');
                card.className = "bg-white border border-amber-200 rounded-2xl p-4";
                card.innerHTML = `<h3 class="font-bold text-amber-600 mb-3 border-b border-amber-50 pb-1 text-sm">${event}</h3>`;
                
                for(let i=0; i<4; i++) {
                    const sel = document.createElement('select');
                    sel.className = "w-full mb-2 p-2 bg-amber-50 rounded-lg text-xs outline-none focus:ring-1 focus:ring-amber-400";
                    let opts = `<option value="">名額 ${i+1}</option>`;
                    teamStudents.forEach(s => {
                        const isOther = selections.some((name, idx) => name === s.name && idx !== i);
                        opts += `<option value="${s.name}" ${selections[i]===s.name?'selected':''} ${isOther?'disabled':''}>${s.name}</option>`;
                    });
                    sel.innerHTML = opts;
                    sel.onchange = (e) => {
                        if(!lineups[team]) lineups[team] = {};
                        if(!lineups[team][event]) lineups[team][event] = ["","","",""];
                        lineups[team][event][i] = e.target.value;
                        localStorage.setItem('ckt_lineups_v4', JSON.stringify(lineups));
                        renderLineup();
                    };
                    card.appendChild(sel);
                }
                container.appendChild(card);
            });
        }

        // --- 4. 管理 ---
        function renderStudentSettings() {
            const tbody = document.getElementById('masterStudentTable');
            document.getElementById('studentCount').innerText = students.length;
            tbody.innerHTML = '';
            students.sort((a,b) => a.team.localeCompare(b.team)).forEach((s, idx) => {
                tbody.innerHTML += `<tr><td class="p-2 font-bold">${s.name}</td><td class="p-2 text-xs">${s.team}</td><td class="p-2 text-xs">${s.year}</td><td class="p-2 text-center"><button onclick="deleteStd(${idx})" class="text-red-400">×</button></td></tr>`;
            });
            localStorage.setItem('ckt_students_v4', JSON.stringify(students));
        }

        function deleteStd(idx) { if(confirm('刪除？')) { students.splice(idx,1); renderStudentSettings(); } }

        function addStudentManual() {
            const name = document.getElementById('newSName').value.trim();
            const year = parseInt(document.getElementById('newSYear').value);
            const team = document.getElementById('newSTeam').value;
            if(name) { students.push({name, year, team}); renderStudentSettings(); document.getElementById('newSName').value=''; }
        }

        function resetToDefault() {
            if(confirm('這將恢復原始 38 位學生名單並清空修改，確定嗎？')) {
                students = JSON.parse(JSON.stringify(DEFAULT_STUDENTS));
                renderStudentSettings();
                location.reload();
            }
        }

        // --- 初始化 ---
        (function init() {
            const selects = ['filterTeamTrial', 'leaderTeamSelect', 'teamSelect', 'newSTeam'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                teams.forEach(t => el.innerHTML += `<option value="${t}">${t}</option>`);
            });
            const yearEl = document.getElementById('newSYear');
            for(let y=2017; y<=2026; y++) yearEl.innerHTML += `<option value="${y}">${y}</option>`;
            
            showTab('trial');
        })();
    </script>
</body>
</html>
