<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKT兒童競技管理程式 V6.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: #334155; overflow-x: hidden; }
        .kid-font { font-family: 'ZCOOL+KuaiLe', cursive; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn { transition: all 0.2s; border-radius: 12px; font-weight: 700; padding: 6px 12px; font-size: 0.85rem; }
        
        /* 錄入表格：V6.2 比例 */
        .trial-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
        .trial-table th, .trial-table td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 8px 4px; }
        .col-name { width: 25%; }
        .col-event { width: 35%; }
        .col-score { width: 40%; }

        /* 彈窗 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
        .modal.active { display: flex; }

        /* 數字鍵盤 */
        #numpadModal { transition: transform 0.3s ease-out; transform: translateY(100%); position: fixed; bottom: 0; left: 0; right: 0; z-index: 150; }
        #numpadModal.active { transform: translateY(0); }
        .key-btn { aspect-ratio: 1/0.65; font-size: 1.4rem; font-weight: bold; border-radius: 10px; background: white; box-shadow: 0 2px 0 #cbd5e1; display: flex; align-items: center; justify-content: center; }
        .key-btn:active { background: #e2e8f0; transform: translateY(2px); box-shadow: none; }

        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white shadow-sm sticky top-0 z-50 no-print border-b border-sky-100">
        <div class="max-w-7xl mx-auto px-2 py-3 flex flex-col items-center">
            <h1 class="text-lg font-bold text-sky-500 kid-font mb-2">🎈 CKT管理程式 V6.5</h1>
            <div class="flex gap-1 overflow-x-auto w-full justify-center">
                <button onclick="showTab('trial')" class="nav-btn bg-sky-500 text-white">成績錄入</button>
                <button onclick="showTab('leaderboard')" class="nav-btn bg-emerald-500 text-white">龍虎榜</button>
                <button onclick="showTab('lineup')" class="nav-btn bg-amber-500 text-white">排陣表</button>
                <button onclick="showTab('settings')" class="nav-btn bg-slate-600 text-white">設定管理</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-2">
        <div id="trial" class="tab-content active">
            <div class="bg-white rounded-2xl shadow-sm p-3 border border-sky-100">
                <div class="flex flex-col gap-2 mb-4">
                    <div class="flex gap-2">
                        <select id="filterTeamTrial" onchange="updateStudentFilterDropdown(); renderTrialEditor();" class="flex-1 rounded-lg border-sky-200 text-sm p-2 bg-sky-50 font-bold outline-none ring-1 ring-sky-100"></select>
                        <select id="filterStudentTrial" onchange="renderTrialEditor()" class="flex-1 rounded-lg border-sky-200 text-sm p-2 bg-white outline-none ring-1 ring-sky-100">
                            <option value="">--- 全隊顯示 ---</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportScores()" class="flex-1 bg-indigo-500 text-white py-2 rounded-lg text-xs font-bold shadow-sm">📤 匯出 Excel</button>
                        <label class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-bold text-center cursor-pointer border border-slate-200">
                            📥 匯入 Excel <input type="file" class="hidden" onchange="importScores(event)">
                        </label>
                    </div>
                </div>
                
                <table class="trial-table">
                    <thead>
                        <tr class="text-sky-700 border-b border-sky-100 text-xs">
                            <th class="col-name text-left pl-2">姓名</th><th class="col-event text-left">項目</th><th class="col-score text-center">成績</th>
                        </tr>
                    </thead>
                    <tbody id="trialRows" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="leaderboard" class="tab-content">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-xl font-bold text-emerald-600 kid-font">🏆 隊伍龍虎榜</h2>
                <select id="leaderTeamSelect" onchange="renderLeaderboard()" class="bg-emerald-50 rounded-lg px-3 py-1 font-bold text-emerald-700 text-sm"></select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="leaderGrid"></div>
        </div>

        <div id="lineup" class="tab-content">
            <div class="bg-white rounded-2xl shadow-sm p-4 border border-amber-100">
                <div class="flex flex-wrap gap-2 mb-4 no-print items-center">
                    <select id="teamSelect" onchange="renderLineup()" class="rounded-lg border-amber-200 font-bold text-amber-700 p-2 text-sm bg-amber-50"></select>
                    <button onclick="autoFillLineup()" class="bg-amber-400 text-white font-bold px-3 py-2 rounded-lg text-xs">🤖 自動排陣</button>
                    <button onclick="window.print()" class="bg-slate-700 text-white px-3 py-2 rounded-lg text-xs">🖨️ 列印</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs text-left border-collapse">
                        <thead><tr class="bg-amber-100 text-amber-800 border-y border-amber-200"><th class="p-2">項目</th><th>名額1</th><th>名額2</th><th>名額3</th><th>名額4</th></tr></thead>
                        <tbody id="lineupTbody" class="divide-y divide-amber-50"></tbody>
                    </table>
                </div>
                <div id="studentSummaryList" class="mt-4 space-y-1"></div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="space-y-4">
                <div class="bg-white rounded-2xl shadow-sm p-4 border border-indigo-100">
                    <h3 class="font-bold text-indigo-700 mb-2 text-sm">🚩 隊伍管理</h3>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="newTeamInput" placeholder="新隊伍" class="border rounded p-2 text-sm flex-1 outline-none">
                        <button onclick="addTeam()" class="bg-indigo-500 text-white px-4 rounded text-sm font-bold">新增</button>
                    </div>
                    <div id="teamListContainer" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-4 border border-sky-100">
                    <h3 class="font-bold text-sky-700 mb-2 text-sm">👤 新增學生</h3>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="stdAddName" placeholder="姓名" class="border rounded p-2 text-sm outline-none">
                        <input type="number" id="stdAddYear" placeholder="年份" class="border rounded p-2 text-sm outline-none">
                    </div>
                    <div class="flex gap-2">
                        <select id="stdAddTeam" class="flex-1 border rounded p-2 text-sm bg-slate-50 outline-none"></select>
                        <button onclick="addStudent()" class="bg-sky-500 text-white px-6 rounded text-sm font-bold">確認新增</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-4 border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-2 text-sm">👨‍🎓 學生名單 (<span id="studentCount">0</span>人)</h3>
                    <div class="max-h-80 overflow-y-auto">
                        <table class="w-full text-xs">
                            <tbody id="masterStudentTable" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="editModal" class="modal">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl">
            <h3 class="font-bold mb-4 text-slate-700">編輯學生資料</h3>
            <input type="text" id="editStdName" class="w-full border rounded-xl p-3 mb-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
            <input type="number" id="editStdYear" class="w-full border rounded-xl p-3 mb-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
            <select id="editStdTeam" class="w-full border rounded-xl p-3 mb-4 text-sm bg-slate-50 outline-none"></select>
            <div class="flex gap-2">
                <button onclick="closeEditModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">取消</button>
                <button id="saveEditBtn" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-bold">儲存</button>
            </div>
        </div>
    </div>

    <div id="numpadModal" class="bg-slate-100 border-t-2 border-slate-300 p-3 shadow-2xl no-print">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-2 px-1">
                <span id="numpadTargetInfo" class="text-xs font-bold text-sky-700">錄入成績</span>
                <button onclick="closeNumpad()" class="bg-sky-600 text-white px-8 py-2 rounded-full font-bold text-sm">完成</button>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button class="key-btn" onclick="pressKey('1')">1</button><button class="key-btn" onclick="pressKey('2')">2</button><button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button><button class="key-btn" onclick="pressKey('5')">5</button><button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button><button class="key-btn" onclick="pressKey('8')">8</button><button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn" onclick="pressKey('.')">.</button><button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn bg-red-50 text-red-500" onclick="pressKey('back')">⌫</button>
            </div>
        </div>
    </div>

    <script>
        const EVENT_CONFIG = {
            "原地擲膠圈": { unit: "分", sort: "desc" }, "速度跨欄": { unit: "秒", sort: "asc" },
            "前拋藥球": { unit: "米", sort: "desc" }, "十字跳": { unit: "分", sort: "desc" },
            "來回節奏跑": { unit: "秒", sort: "asc" }, "立定跳遠": { unit: "米", sort: "desc" },
            "擲標槍": { unit: "米", sort: "desc" }, "A 級方程式": { unit: "秒", sort: "asc" }
        };
        const EVENTS = Object.keys(EVENT_CONFIG);
        
        const DEFAULT_STUDENTS = [
            {name: "陳希諾", year: 2019, team: "CKT2019A"}, {name: "陳逸朗", year: 2019, team: "CKT2019A"}, {name: "林嘉盛", year: 2019, team: "CKT2019A"}, {name: "陳梓瑩", year: 2019, team: "CKT2019A"}, {name: "徐梓添", year: 2019, team: "CKT2019A"}, {name: "邱俊傑", year: 2019, team: "CKT2019A"},
            {name: "謝瀚陞", year: 2018, team: "CKT2018A"}, {name: "鄔嘉樂", year: 2018, team: "CKT2018A"}, {name: "胡仲希", year: 2018, team: "CKT2018A"}, {name: "梁喬珀", year: 2018, team: "CKT2018A"}, {name: "伍梓灝", year: 2018, team: "CKT2018A"},
            {name: "李天仁", year: 2018, team: "CKT2018B"}, {name: "雪壬愷", year: 2018, team: "CKT2018B"}, {name: "鄧雅殷", year: 2018, team: "CKT2018B"}, {name: "鄧善殷", year: 2018, team: "CKT2018B"}, {name: "杜濼麒", year: 2018, team: "CKT2018B"},
            {name: "童文涵", year: 2018, team: "CKT2018C"}, {name: "陳希兒", year: 2018, team: "CKT2018C"}, {name: "黄洛鋋", year: 2018, team: "CKT2018C"}, {name: "李晉兒", year: 2018, team: "CKT2018C"}, {name: "周暟淳", year: 2018, team: "CKT2018C"},
            {name: "林靖柔", year: 2018, team: "CKT2018D"}, {name: "李心妤", year: 2018, team: "CKT2018D"}, {name: "李宇軒", year: 2018, team: "CKT2018D"}, {name: "李泓亮", year: 2018, team: "CKT2018D"}, {name: "邱曼露", year: 2018, team: "CKT2018D"},
            {name: "余焌達", year: 2017, team: "CKT2017A"}, {name: "鄧萃藍", year: 2017, team: "CKT2017A"}, {name: "郭俊希", year: 2017, team: "CKT2017A"}, {name: "羅啟鋒", year: 2017, team: "CKT2017A"}, {name: "彭子恪", year: 2017, team: "CKT2017A"}, {name: "江柏昊", year: 2017, team: "CKT2017A"},
            {name: "劉栢熹", year: 2017, team: "CKT2017B"}, {name: "陳希姸", year: 2017, team: "CKT2017B"}, {name: "麥風", year: 2017, team: "CKT2017B"}, {name: "梁匡毅", year: 2017, team: "CKT2017B"}, {name: "盧鍵霆", year: 2017, team: "CKT2017B"}, {name: "徐梓程", year: 2017, team: "CKT2017B"}
        ];

        // 核心：使用 v5 金鑰確保數據繼承
        let students = JSON.parse(localStorage.getItem('ckt_students_v5')) || DEFAULT_STUDENTS;
        let teams = JSON.parse(localStorage.getItem('ckt_teams_v5')) || ["CKT2017A", "CKT2017B", "CKT2018A", "CKT2018B", "CKT2018C", "CKT2018D", "CKT2019A"];
        let trialResults = JSON.parse(localStorage.getItem('ckt_trial_v5')) || [];
        let lineups = JSON.parse(localStorage.getItem('ckt_lineups_v5')) || {};
        let currentInput = null;

        function saveData() {
            localStorage.setItem('ckt_students_v5', JSON.stringify(students));
            localStorage.setItem('ckt_teams_v5', JSON.stringify(teams));
            localStorage.setItem('ckt_trial_v5', JSON.stringify(trialResults));
            localStorage.setItem('ckt_lineups_v5', JSON.stringify(lineups));
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'trial') { updateStudentFilterDropdown(); renderTrialEditor(); }
            if(tabId === 'leaderboard') renderLeaderboard();
            if(tabId === 'lineup') renderLineup();
            if(tabId === 'settings') { renderTeamSettings(); renderStudentSettings(); }
        }

        // --- 成績錄入與編輯 (V6.2 固定桌寬版) ---
        function updateStudentFilterDropdown() {
            const team = document.getElementById('filterTeamTrial').value;
            const select = document.getElementById('filterStudentTrial');
            select.innerHTML = '<option value="">--- 全隊顯示 ---</option>';
            students.filter(s => s.team === team).forEach(s => select.innerHTML += `<option value="${s.name}">${s.name}</option>`);
        }

        function renderTrialEditor() {
            const team = document.getElementById('filterTeamTrial').value;
            const studentFilter = document.getElementById('filterStudentTrial').value;
            const container = document.getElementById('trialRows'); container.innerHTML = '';
            if(!team) return;
            let filtered = students.filter(s => s.team === team);
            if(studentFilter) filtered = filtered.filter(s => s.name === studentFilter);
            filtered.forEach(s => {
                EVENTS.forEach((event, idx) => {
                    const record = trialResults.find(r => r.name === s.name && r.event === event) || {score: ''};
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-slate-50";
                    tr.innerHTML = `<td class="col-name pl-2 font-bold text-slate-600">${idx === 0 ? s.name : ''}</td>
                        <td class="col-event text-sky-600 text-xs">${event}</td>
                        <td class="col-score text-center"><input type="text" readonly value="${record.score}" onclick="openNumpad(this, '${s.name}', '${event}')" onchange="saveScore('${s.name}', '${event}', this.value)" class="w-20 border-2 border-sky-100 rounded-md py-1 text-center font-bold text-sky-700 bg-white"></td>`;
                    container.appendChild(tr);
                });
                container.innerHTML += `<tr class="bg-slate-100"><td colspan="3" class="h-1 p-0"></td></tr>`;
            });
        }

        function openNumpad(el, name, event) {
            currentInput = el;
            document.getElementById('numpadTargetInfo').innerText = `${name} - ${event}`;
            document.getElementById('numpadModal').classList.add('active');
            el.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
        function closeNumpad() { document.getElementById('numpadModal').classList.remove('active'); currentInput = null; }
        function pressKey(key) {
            if(!currentInput) return;
            if(key === 'back') currentInput.value = currentInput.value.slice(0, -1);
            else { if(key === '.' && currentInput.value.includes('.')) return; currentInput.value += key; }
            currentInput.dispatchEvent(new Event('change'));
        }
        function saveScore(name, event, score) {
            const idx = trialResults.findIndex(r => r.name === name && r.event === event);
            let num = parseFloat(score); if(isNaN(num)) num = 0;
            if(idx > -1) { trialResults[idx].score = num; trialResults[idx].ts = new Date().toLocaleString(); }
            else trialResults.push({name, event, score: num, ts: new Date().toLocaleString()});
            saveData();
        }

        // --- 龍虎榜 (含前四強總和) ---
        function renderLeaderboard() {
            const team = document.getElementById('leaderTeamSelect').value;
            const container = document.getElementById('leaderGrid'); container.innerHTML = '';
            if(!team) return;
            EVENTS.forEach(event => {
                const config = EVENT_CONFIG[event];
                let list = trialResults.filter(r => { const std = students.find(s => s.name === r.name); return std && std.team === team && r.event === event && r.score > 0; });
                if (config.sort === 'asc') list.sort((a,b) => a.score - b.score); else list.sort((a,b) => b.score - a.score);
                const sum = list.slice(0, 4).reduce((acc, curr) => acc + curr.score, 0).toFixed(2);
                let html = `<div class="bg-white rounded-xl shadow-sm border border-emerald-100 overflow-hidden"><div class="bg-emerald-500 p-2 text-white font-bold text-center text-xs">${event}</div><div class="p-2 space-y-1 min-h-[100px]">`;
                if(list.length === 0) html += `<div class="text-slate-400 text-center py-4 text-xs">無成績</div>`;
                else list.slice(0, 6).forEach((r, i) => { html += `<div class="flex justify-between text-xs border-b border-emerald-50 py-1"><span class="${i<3?'text-orange-600 font-bold':''}">${i+1}. ${r.name}</span><span class="font-bold">${r.score}</span></div>`; });
                html += `</div><div class="bg-emerald-50 p-2 border-t border-emerald-100 flex justify-between items-center"><span class="text-[10px] font-bold text-emerald-600">前四強總計:</span><span class="text-sm font-black text-emerald-800">${sum}</span></div></div>`;
                container.innerHTML += html;
            });
        }

        // --- 管理功能 (學生新增、編輯、刪除) ---
        function addStudent() {
            const name = document.getElementById('stdAddName').value.trim();
            const year = document.getElementById('stdAddYear').value;
            const team = document.getElementById('stdAddTeam').value;
            if(name && year && team) { students.push({name, year, team}); saveData(); renderStudentSettings(); document.getElementById('stdAddName').value=''; document.getElementById('stdAddYear').value=''; }
        }
        function openEditModal(idx) {
            const s = students[idx]; document.getElementById('editStdName').value = s.name; document.getElementById('editStdYear').value = s.year;
            const ts = document.getElementById('editStdTeam'); ts.innerHTML = ''; teams.forEach(t => ts.innerHTML += `<option value="${t}" ${t===s.team?'selected':''}>${t}</option>`);
            document.getElementById('saveEditBtn').onclick = () => {
                const oldName = students[idx].name; const newName = document.getElementById('editStdName').value.trim();
                if(oldName !== newName) { 
                    trialResults.forEach(r => { if(r.name === oldName) r.name = newName; }); 
                    Object.keys(lineups).forEach(t => { Object.keys(lineups[t]).forEach(ev => { lineups[t][ev] = lineups[t][ev].map(n => n === oldName ? newName : n); }); });
                }
                students[idx] = { name: newName, year: document.getElementById('editStdYear').value, team: ts.value };
                saveData(); closeEditModal(); renderStudentSettings();
            };
            document.getElementById('editModal').classList.add('active');
        }
        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
        function deleteStd(idx) { if(confirm('確定刪除該學生嗎？相關成績也會受影響。')) { students.splice(idx,1); saveData(); renderStudentSettings(); } }
        
        function renderStudentSettings() {
            const tbody = document.getElementById('masterStudentTable'); document.getElementById('studentCount').innerText = students.length;
            tbody.innerHTML = ''; students.forEach((s, i) => {
                tbody.innerHTML += `<tr class="border-b border-slate-50"><td class="p-2 font-medium">${s.name} <span class="text-slate-400 text-[10px]">(${s.year})</span></td><td class="text-slate-500 text-xs">${s.team}</td><td class="text-right p-2">
                    <button onclick="openEditModal(${i})" class="text-indigo-500 mr-3 font-bold">編輯</button>
                    <button onclick="deleteStd(${i})" class="text-red-300">×</button></td></tr>`;
            });
        }

        function renderTeamSettings() {
            const cont = document.getElementById('teamListContainer'); cont.innerHTML = '';
            teams.forEach(t => cont.innerHTML += `<div class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold flex items-center">${t} <button onclick="deleteTeam('${t}')" class="ml-2 text-red-300">×</button></div>`);
            ['filterTeamTrial','leaderTeamSelect','teamSelect','stdAddTeam'].forEach(id => {
                const el = document.getElementById(id); const old = el.value; el.innerHTML = '';
                teams.forEach(t => el.innerHTML += `<option value="${t}">${t}</option>`); if(teams.includes(old)) el.value = old;
            });
        }
        function addTeam() { const v = document.getElementById('newTeamInput').value.trim(); if(v && !teams.includes(v)) { teams.push(v); saveData(); renderTeamSettings(); document.getElementById('newTeamInput').value=''; } }
        function deleteTeam(t) { if(confirm(`確定刪除 ${t} 隊嗎？`)) { teams = teams.filter(i=>i!==t); saveData(); renderTeamSettings(); } }

        // --- Excel 匯出匯入 (移動至錄入頁使用) ---
        function exportScores() {
            const data = trialResults.map(r => { const std = students.find(s => s.name === r.name); return { "隊伍": std?std.team:"-", "姓名": r.name, "項目": r.event, "成績": r.score }; });
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "成績清單"); XLSX.writeFile(wb, `CKT_成績備份_${new Date().toLocaleDateString()}.xlsx`);
        }
        function importScores(e) {
            const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    json.forEach(row => { if(row['姓名'] && row['項目']) saveScore(row['姓名'], row['項目'], row['成績'] || 0); });
                    saveData(); renderTrialEditor(); alert("成績匯入成功！");
                } catch(err) { alert("匯入失敗，請確保 Excel 格式正確。"); }
            }; reader.readAsArrayBuffer(file);
        }

        // --- 排陣表功能 (保持不變) ---
        function renderLineup() {
            const team = document.getElementById('teamSelect').value; const teamStds = students.filter(s => s.team === team);
            const tbody = document.getElementById('lineupTbody'); tbody.innerHTML = '';
            EVENTS.forEach(ev => {
                const sels = lineups[team]?.[ev] || ["","","",""];
                let row = `<td class="p-2 font-bold text-amber-900">${ev}</td>`;
                for(let i=0; i<4; i++) {
                    let sHTML = `<select onchange="updateLineup('${team}','${ev}',${i},this.value)" class="w-full border-amber-100 rounded text-[10px] p-1 bg-white">`;
                    sHTML += `<option value="">-</option>`; teamStds.forEach(s => sHTML += `<option value="${s.name}" ${sels[i]===s.name?'selected':''}>${s.name}</option>`);
                    row += `<td>${sHTML}</select></td>`;
                }
                tbody.innerHTML += `<tr class="border-b border-amber-50">${row}</tr>`;
            });
            renderSummary(team);
        }
        function updateLineup(t,e,i,v) { if(!lineups[t]) lineups[t]={}; if(!lineups[t][e]) lineups[t][e]=["","","",""]; lineups[t][e][i]=v; saveData(); renderLineup(); }
        function renderSummary(t) {
            const cont = document.getElementById('studentSummaryList'); cont.innerHTML = '';
            students.filter(s => s.team === t).forEach(s => {
                let myEvs = EVENTS.filter(ev => lineups[t]?.[ev]?.includes(s.name));
                if(myEvs.length>0) cont.innerHTML += `<div class="text-[10px] bg-white p-1 px-2 rounded border border-amber-100"><b>${s.name}:</b> ${myEvs.join('、')}</div>`;
            });
        }
        function autoFillLineup() {
            const team = document.getElementById('teamSelect').value; if(!team) return;
            if(!lineups[team]) lineups[team]={};
            EVENTS.forEach(ev => {
                let list = trialResults.filter(r => { const std = students.find(s => s.name === r.name); return std && std.team === team && r.event === ev && r.score > 0; });
                if(EVENT_CONFIG[ev].sort==='asc') list.sort((a,b)=>a.score-b.score); else list.sort((a,b)=>b.score-a.score);
                lineups[team][ev] = ["","","",""]; list.slice(0,4).forEach((r,i) => lineups[team][ev][i]=r.name);
            });
            saveData(); renderLineup();
        }

        // 初始化
        (function init() { renderTeamSettings(); updateStudentFilterDropdown(); showTab('trial'); })();
    </script>
</body>
</html>
